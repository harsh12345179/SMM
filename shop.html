<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nice & Next StyleUp Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== RESET ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    background:#f5f6fa;
    color:#333;
}

/* ===== HEADER ===== */
.header{
    background:#1f2937;
    color:white;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-weight:bold;
    font-size:22px;
}

.search{
    flex:1;
    display:flex;
    margin:0 30px;
}

.search input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:20px 0 0 20px;
}

.search button{
    padding:10px 18px;
    border:none;
    background:#fbbf24;
    border-radius:0 20px 20px 0;
}

.cart{
    cursor:pointer;
    font-weight:bold;
}

/* ===== HERO ===== */
.banner{
    height:230px;
    background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
    url("https://images.unsplash.com/photo-1483985988355-763728e1935b") center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:32px;
}

/* ===== CATEGORY CARDS ===== */
.section-title{
    padding:25px 40px 10px;
    font-size:26px;
    font-weight:bold;
}

.categories{
    display:flex;
    gap:25px;
    padding:0 40px 40px;
}

.cat{
    flex:1;
    background:white;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    transition:.3s;
}

.cat:hover{
    transform:translateY(-6px);
}

.cat img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.cat p{
    padding:12px;
    text-align:center;
    font-weight:bold;
}

/* ===== PRODUCTS ===== */
.products{
    padding:0 40px 60px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:25px;
}

.product{
    background:white;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    overflow:hidden;
    text-align:center;
}

.product img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.product-info{
    padding:12px;
}

.price{
    color:#e11d48;
    font-weight:bold;
}

.product button{
    margin-top:8px;
    background:#1f2937;
    color:white;
    border:none;
    padding:8px 18px;
    border-radius:20px;
}

/* ===== CART MODAL ===== */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.6);
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    width:360px;
    padding:20px;
    border-radius:10px;
}

.close{
    float:right;
    cursor:pointer;
    color:red;
}

.total{
    font-weight:bold;
    margin-top:10px;
}

.payment{
    margin-top:10px;
    font-size:14px;
    background:#f3f4f6;
    padding:8px;
    border-radius:6px;
}

/* ===== FOOTER ===== */
.footer{
    background:#1f2937;
    color:white;
    text-align:center;
    padding:20px;
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">Nice & Next StyleUp</div>

    <div class="search">
        <input id="searchInput" placeholder="Search products...">
        <button onclick="searchProducts()">Search</button>
    </div>

    <div class="cart" onclick="openCart()">Cart 🛒 (<span id="count">0</span>)</div>
</div>

<div class="banner">Premium Fashion Store</div>

<!-- CATEGORY REDIRECTS -->
<div class="section-title">Shop Collections</div>

<div class="categories">
    <div class="cat" onclick="location.href='men.html'">
        <img src="https://images.unsplash.com/photo-1520975922323-6d2f45b9b6ae">
        <p>Men</p>
    </div>

    <div class="cat" onclick="location.href='women.html'">
        <img src="https://images.unsplash.com/photo-1495121605193-b116b5b09a13">
        <p>Women</p>
    </div>

    <div class="cat" onclick="location.href='kids.html'">
        <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
        <p>Kids</p>
    </div>
</div>

<!-- PRODUCTS -->
<div class="section-title">Trending</div>

<div class="products">

    <div class="product" data-name="Jacket">
        <img src="https://images.unsplash.com/photo-1483985988355-763728e1935b">
        <div class="product-info">
            Jacket<br>
            <div class="price">$29</div>
            <button onclick="addToCart('Jacket',29)">Add</button>
        </div>
    </div>

    <div class="product" data-name="Hoodie">
        <img src="https://images.unsplash.com/photo-1520975922323-6d2f45b9b6ae">
        <div class="product-info">
            Hoodie<br>
            <div class="price">$35</div>
            <button onclick="addToCart('Hoodie',35)">Add</button>
        </div>
    </div>

</div>

<!-- CART -->
<div class="modal" id="cartModal">
    <div class="box">
        <span class="close" onclick="closeCart()">X</span>
        <h3>Your Cart</h3>
        <div id="items"></div>
        <div class="total" id="total"></div>
        <div id="delivery"></div>

        <div class="payment">
            Payment Modes:<br>
            • UPI<br>
            • Credit/Debit Card<br>
            • Net Banking<br>
            • Cash on Delivery<br>
            • PayPal
        </div>
    </div>
</div>

<div class="footer">© 2026 Nice & Next StyleUp</div>

<script>

let cart=[];

function addToCart(name,price){
    cart.push({name,price});
    document.getElementById("count").innerText=cart.length;
}

function openCart(){
    let html="";
    let total=0;

    cart.forEach(i=>{
        html += `${i.name} - $${i.price}<br>`;
        total+=i.price;
    });

    document.getElementById("items").innerHTML=html||"Cart empty";
    document.getElementById("total").innerText="Total: $"+total;

    let d=new Date();
    d.setDate(d.getDate()+4);
    document.getElementById("delivery").innerText="Delivery by "+d.toDateString();

    document.getElementById("cartModal").style.display="flex";
}

function closeCart(){
    document.getElementById("cartModal").style.display="none";
}

function searchProducts(){
    let val=document.getElementById("searchInput").value.toLowerCase();
    document.querySelectorAll(".product").forEach(p=>{
        p.style.display=p.dataset.name.toLowerCase().includes(val)?"block":"none";
    });
}

</script>

</body>
</html>
